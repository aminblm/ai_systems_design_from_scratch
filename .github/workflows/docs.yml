name: Deploy Documentation and Blog
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Site Compiler Plugins
        run: |
          pip install --upgrade pip
          pip install "mkdocs>=1.5.0" "mkdocs-material>=9.0.0,<10.0.0"

      - name: Build and deploy to Github Pages
        run: |
          mkdocs gh-deploy --force 
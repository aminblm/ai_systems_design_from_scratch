<!DOCTYPE html>
<html>
    <head>
        <title> {{ site.title }} </title>
        <link rel="stylesheet" href="{{ site.css }}">
    </head>
    <body>
        <div class="hero">
            <header>
                <h1>{{ site.title }}</h1>
                <p>{{ site.description }}</p>
            </header>
        </div>
        
        <main>
            <div class="container">
                {{ site.content }}
            </div>
        </main>

        <footer>
            <div class="container">
                <p><a href="{{ site.url }}">{{ site.footer_text }} by {{ site.author }}</a></p>
            </div>
        </footer>
    </body>
</html>

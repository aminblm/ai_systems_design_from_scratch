<!DOCTYPE html>
<html>
    <head>
        <title> {{ site.title }} </title>
        <link rel="stylesheet" href="{{ site.css }}">
    </head>
    <body>
        <div class="hero">
            <header>
                <h1>{{ site.title }}</h1>
                <p>{{ site.description }}</p>
            </header>
        </div>
        
        <main>
            <div class="container">
                {{ content }}
            </div>
        </main>

        <footer>
            <div class="container">
                {{ site.footer_text }}
                {{ site.url }}
            </div>
        </footer>
    </body>
</html>
